name: CI — Test & Deploy

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [staging, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Layer 1: Unit Tests ─────────────────────────────────────────────────────
  unit:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --reporter=verbose
        env:
          # Stub values — unit tests mock Supabase
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
          SUPABASE_SERVICE_ROLE_KEY: stub-service-key

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Layer 2: Integration Tests ──────────────────────────────────────────────
  integration:
    name: Integration Tests (Staging Supabase)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration -- --reporter=verbose
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}

  # ── Layer 3: E2E Tests ──────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright — Transactional)
    runs-on: ubuntu-latest
    needs: integration
    # continue-on-error removed — E2E now gates merge to staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Poll until Vercel preview returns 200. Deployments take 30-90s after push.
      # The bypass header is required — without it the staging URL returns 401.
      - name: Wait for Vercel deployment to be ready
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Waiting for $STAGING_URL..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "x-vercel-automation-bypass-secret: $VERCEL_AUTOMATION_BYPASS_SECRET" \
              "$STAGING_URL")
            echo "  attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "308" ] || [ "$STATUS" = "301" ]; then
              echo "✓ Ready"
              exit 0
            fi
            sleep 10
          done
          echo "✗ Not ready after 240s"
          exit 1

      - name: Run E2E tests against staging
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL }}
          TEST_PRO_EMAIL: ${{ secrets.TEST_PRO_EMAIL }}
          TEST_PRO_PASSWORD: ${{ secrets.TEST_PRO_PASSWORD }}
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Post Playwright results to PR
        uses: actions/github-script@v7
        if: failure() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs')
            let summary = '## ❌ E2E Tests Failed\n\n'
            try {
              const results = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'))
              const failed = results.suites?.flatMap(s => s.specs?.filter(sp => sp.ok === false) || []) || []
              if (failed.length > 0) {
                summary += '**Failed tests:**\n'
                failed.forEach(t => { summary += `- ❌ ${t.title}\n` })
              }
            } catch (e) {
              summary += 'Could not parse test results.\n'
            }
            summary += '\n[View full Playwright report in Actions artifacts]'
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            })

  # ── Summary ─────────────────────────────────────────────────────────────────
  all-passed:
    name: ✅ All Tests Passed
    runs-on: ubuntu-latest
    needs: [unit, integration, e2e]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.unit.result }}" != "success" || \
                "${{ needs.integration.result }}" != "success" || \
                "${{ needs.e2e.result }}" != "success" ]]; then
            echo "❌ One or more test layers failed."
            exit 1
          fi
          echo "✅ All test layers passed — safe to merge."
